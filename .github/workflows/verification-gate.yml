# Verification Gate — the Loop-C REPAIR validator (must-fail-on-parent + mutation score + no-weakening).
# It validates a *repair* (a fix + a regression test that must FAIL on the parent), NOT ordinary feature PRs.
# On a feature PR must-fail-on-parent is INFRA (a new test can't run on the parent, where its symbols don't
# exist yet) and 0.75 is the AUTO-APPLY mutation bar, not a code-quality bar — so it can never pass there.
# It therefore runs ONLY on a PR explicitly labeled `verification-gate` (an actual repair to validate).
# Human PRs are covered by the `test` job (full suite) + commitlint. See gate/README.md.
#
# Requires full history (fetch-depth: 0). The gate builds throwaway git worktrees and symlinks node_modules
# into them, so `bun install` must run first.
name: Verification Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

# One run per PR; cancel superseded runs.
concurrency:
  group: verification-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    # Opt-in: only validate PRs explicitly labeled as a repair. Unlabeled PRs skip this (no false red).
    if: contains(github.event.pull_request.labels.*.name, 'verification-gate')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Verification Gate
        run: |
          bun run gate/cli.ts \
            --repo . \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --min-mutation-score 0.75
        # Non-zero exit fails the check. The step summary + ::error:: annotations show why.
