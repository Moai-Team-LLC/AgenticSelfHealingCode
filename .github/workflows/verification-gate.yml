# Verification Gate — runs the non-LLM gate (must-fail-on-parent + mutation score + no-weakening)
# on every PR. Reference workflow: adjust the path to gate/cli.ts and the --test-cmd to your project.
#
# Requires full history (fetch-depth: 0) so the gate can check out and diff base..head. The gate
# builds throwaway git worktrees and symlinks node_modules into them, so `bun install` must run first.
name: Verification Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

# One run per PR; cancel superseded runs.
concurrency:
  group: verification-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Verification Gate
        run: |
          bun run gate/cli.ts \
            --repo . \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --min-mutation-score 0.75
        # Non-zero exit fails the check. The step summary + ::error:: annotations show why.
