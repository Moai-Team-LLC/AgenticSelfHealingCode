name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you do, what did you expect, what happened instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or a failing test. Include the package (`@sho/...`) if known.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "0.1.0 or a commit SHA"
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Bun version, Postgres/pgvector version if the DB path is involved.
