name: Feature request
description: Propose an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is harder than it should be.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: >
        What you'd like to see. Note the design constraints: contracts-first, autonomy is
        outcome-earned (never default-on), infrastructure behind ports with in-repo defaults.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
